services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: anvil --host 0.0.0.0 --port 8545
    ports:
      - "8545:8545"

  orchestrator:
    build:
      context: ../..
      dockerfile: infra/docker/orchestrator.Dockerfile
    env_file:
      - ../env/orchestrator.env.example
    command: uvicorn orchestrator.app.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - anvil
