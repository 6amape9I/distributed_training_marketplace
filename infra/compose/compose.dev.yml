# Legacy compatibility file.
# Stage 6 canonical local demo entrypoint is `infra/compose/compose.demo.yml`.
services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: anvil --host 0.0.0.0 --port 8545
    ports:
      - "8545:8545"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dtm
      POSTGRES_PASSWORD: dtm
      POSTGRES_DB: dtm_orchestrator
    ports:
      - "5432:5432"

  orchestrator:
    build:
      context: ../..
      dockerfile: infra/docker/orchestrator.Dockerfile
    env_file:
      - ../env/orchestrator.env.example
    command: uvicorn orchestrator.app.api.main:create_app --factory --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - anvil
      - postgres

  trainer-1:
    build:
      context: ../..
      dockerfile: infra/docker/trainer.Dockerfile
    env_file:
      - ../env/trainer.env.example
    environment:
      TRAINER_NODE_ID: trainer-1
      TRAINER_PUBLIC_URL: http://trainer-1:8010
      LOCAL_WORKSPACE_PATH: /app/data/trainer-1
    ports:
      - "8010:8010"
    depends_on:
      - orchestrator

  trainer-2:
    build:
      context: ../..
      dockerfile: infra/docker/trainer.Dockerfile
    env_file:
      - ../env/trainer.env.example
    command: uvicorn trainer_agent.app.main:create_app --factory --host 0.0.0.0 --port 8011
    environment:
      TRAINER_NODE_ID: trainer-2
      TRAINER_BIND_PORT: 8011
      TRAINER_PUBLIC_URL: http://trainer-2:8011
      LOCAL_WORKSPACE_PATH: /app/data/trainer-2
    ports:
      - "8011:8011"
    depends_on:
      - orchestrator

  evaluator-1:
    build:
      context: ../..
      dockerfile: infra/docker/evaluator.Dockerfile
    env_file:
      - ../env/evaluator.env.example
    environment:
      EVALUATOR_NODE_ID: evaluator-1
      EVALUATOR_PUBLIC_URL: http://evaluator-1:8020
      LOCAL_WORKSPACE_PATH: /app/data/evaluator-1
    ports:
      - "8020:8020"
    depends_on:
      - orchestrator
