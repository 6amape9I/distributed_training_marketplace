name: dtm-demo

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: anvil --host 0.0.0.0 --port 8545
    working_dir: /workspace/contracts
    volumes:
      - ../../:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 2s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dtm
      POSTGRES_PASSWORD: dtm
      POSTGRES_DB: dtm_orchestrator
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtm -d dtm_orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  orchestrator:
    build:
      context: ../..
      dockerfile: infra/docker/orchestrator.Dockerfile
    env_file:
      - ../env/orchestrator.env.example
    command: uvicorn orchestrator.app.api.main:create_app --factory --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - orchestrator-artifacts:/app/artifacts
    restart: unless-stopped
    depends_on:
      anvil:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  trainer-1:
    build:
      context: ../..
      dockerfile: infra/docker/trainer.Dockerfile
    env_file:
      - ../env/trainer.env.example
    environment:
      TRAINER_NODE_ID: trainer-1
      TRAINER_PUBLIC_URL: http://trainer-1:8010
      LOCAL_WORKSPACE_PATH: /app/data/trainer-1
    ports:
      - "8010:8010"
    volumes:
      - trainer-1-workspace:/app/data/trainer-1
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=2).status == 200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  trainer-2:
    build:
      context: ../..
      dockerfile: infra/docker/trainer.Dockerfile
    env_file:
      - ../env/trainer.env.example
    command: uvicorn trainer_agent.app.main:create_app --factory --host 0.0.0.0 --port 8011
    environment:
      TRAINER_NODE_ID: trainer-2
      TRAINER_BIND_PORT: 8011
      TRAINER_PUBLIC_URL: http://trainer-2:8011
      LOCAL_WORKSPACE_PATH: /app/data/trainer-2
    ports:
      - "8011:8011"
    volumes:
      - trainer-2-workspace:/app/data/trainer-2
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8011/health', timeout=2).status == 200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  evaluator-1:
    build:
      context: ../..
      dockerfile: infra/docker/evaluator.Dockerfile
    env_file:
      - ../env/evaluator.env.example
    environment:
      EVALUATOR_NODE_ID: evaluator-1
      EVALUATOR_PUBLIC_URL: http://evaluator-1:8020
      LOCAL_WORKSPACE_PATH: /app/data/evaluator-1
    ports:
      - "8020:8020"
    volumes:
      - evaluator-1-workspace:/app/data/evaluator-1
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8020/health', timeout=2).status == 200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres-data:
  orchestrator-artifacts:
  trainer-1-workspace:
  trainer-2-workspace:
  evaluator-1-workspace:
